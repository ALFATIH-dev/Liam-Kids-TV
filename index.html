<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Quotes</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.box {
  text-align: center;
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 15px;
  width: 300px;
}

button {
  margin-top: 15px;
  padding: 10px;
  width: 100%;
  border: none;
  background: #ff4081;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #e73370;
}
</style>
</head>

<body>

<div class="box">
  <h2>Anime Quotes 🎬</h2>
  <p id="quote">Klik tombol untuk quotes</p>
  <button onclick="generate()">Generate</button>
</div>

<script>
const quotes = [
  "Jangan menyerah, itulah jalan ninja ku! - Naruto",
  "Aku akan menjadi Raja Bajak Laut! - Luffy",
  "Kekuatan datang dari tekad. - Tanjiro",
  "Jika kau tidak berjuang, kau tidak akan menang. - Eren",
  "Manusia menjadi kuat karena mereka punya sesuatu untuk dilindungi. - HxH",
  "Kesempatan hanya datang bagi mereka yang siap. - Haikyuu"
];

function generate() {
  let random = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById("quote").innerText = random;
}
</script>

</body>
</html>
